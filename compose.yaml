version: "3.9"

services:
  user-spring:
    build: ./user-management-microservice
    image: user-management-microservice
    container_name: user-spring
    ports:
      - "8081:8081"
    environment:
      DB_IP: user-postgres-db
    depends_on:
      user-postgres-db:
        condition: service_healthy
    networks:
      - backend-system
    labels:
      - "traefik.enable=true"

  user-postgres-db:
    image: postgres:16
    container_name: user-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user-db
    volumes:
      - user-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend-system

  device-spring:
    build: ./device-management-microservice
    image: device-management-microservice
    container_name: device-spring
    ports:
      - "8082:8082"
    environment:
      DB_IP: device-postgres-db
    depends_on:
      device-postgres-db:
        condition: service_healthy
    networks:
      - backend-system
    labels:
      - "traefik.enable=true"

  device-postgres-db:
    image: postgres:16
    container_name: device-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: device-db
    volumes:
      - device-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend-system

  authentication-spring:
    build: ./authentication-microservice
    image: authentication-microservice
    container_name: authentication-spring
    ports:
      - "8083:8083"
    environment:
      DB_IP: authentication-postgres-db
    depends_on:
      authentication-postgres-db:
        condition: service_healthy
    networks:
      - backend-system
    labels:
      - "traefik.enable=true"

  authentication-postgres-db:
    image: postgres:16
    container_name: authentication-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user-credentials-db
    volumes:
      - authentication-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend-system

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    ports:
      - "80:80"      # HTTP
      - "8080:8080"  # Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./reverse-proxy/traefik.yaml:/etc/traefik/traefik.yml:ro"
      - "./reverse-proxy/dynamic:/etc/traefik/dynamic:ro"
    networks:
      - backend-system
    labels:
      - "traefik.enable=true"

volumes:
  user-pgdata:
  device-pgdata:
  authentication-pgdata:

networks:
  backend-system:
    driver: bridge
