version: "3.9"

services:
  user_spring:
    build: ./user-management-microservice
    image: user-management-microservice
    container_name: user_spring
    ports:
      - "8081:8081"
    environment:
      DB_IP: user_postgres_db
    depends_on:
      user_postgres_db:
        condition: service_healthy
    networks:
      - backend
    labels:
      - "traefik.enable=true"

  user_postgres_db:
    image: postgres:16
    container_name: user_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    volumes:
      - user_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  device_spring:
    build: ./device-management-microservice
    image: device-management-microservice
    container_name: device_spring
    ports:
      - "8082:8082"
    environment:
      DB_IP: device_postgres_db
    depends_on:
      device_postgres_db:
        condition: service_healthy
    networks:
      - backend
    labels:
      - "traefik.enable=true"

  device_postgres_db:
    image: postgres:16
    container_name: device_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: device_db
    volumes:
      - device_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  authentication_spring:
    build: ./authentication-microservice
    image: authentication-microservice
    container_name: authentication_spring
    ports:
      - "8083:8083"
    environment:
      DB_IP: authentication_postgres_db
    depends_on:
      authentication_postgres_db:
        condition: service_healthy
    networks:
      - backend
    labels:
      - "traefik.enable=true"

  authentication_postgres_db:
    image: postgres:16
    container_name: authentication_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_credentials_db
    volumes:
      - authentication_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    ports:
      - "80:80"      # HTTP
      - "8080:8080"  # Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./reverse-proxy/traefik.yaml:/etc/traefik/traefik.yml:ro"
      - "./reverse-proxy/dynamic:/etc/traefik/dynamic:ro"
    networks:
      - backend
    labels:
      - "traefik.enable=true"

volumes:
  user_pgdata:
  device_pgdata:
  authentication_pgdata:

networks:
  backend:
    driver: bridge
